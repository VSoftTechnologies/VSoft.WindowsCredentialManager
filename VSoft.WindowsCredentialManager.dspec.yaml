# DPM package spec file
# Used to build packages

min client version: 1.0
# metadata describes the package to the user
metadata:
  id: VSoft.WindowsCredentialManager
  version: 1.0.4
  authors: [ Vincent Parrett ]
  description: A simple wrapper over the Windows Credential Manager API
  projectUrl: https://github.com/VSoftTechnologies/VSoft.WindowsCredMananger
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.WindowsCredMananger
  license: Apache-2.0
  readme: README.md
  copyright: Vincent Parrett and contributors
  tags: [ credentials, winapi ]
  repositoryCommit: #HASH#

targetPlatforms:
  - compiler from: delphixe2
    compiler to: delphi10.4
    platforms: [ win32, win64 ]
  - compiler from: delphi11
    compiler to: delphi13
    platforms: [ win32, win64 ]

templates:
  - name: default

    source:
      - src: ./LICENSE
      - src: ./src/*.pas
      - src: ./packages/VSoft.WindowsCredentialManagerR.dpk
      - src: ./packages/VSoft.WindowsCredentialManagerR.dproj
    build:
      - project: ./packages/VSoft.WindowsCredentialManagerR.dproj
